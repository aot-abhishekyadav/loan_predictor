<!DOCTYPE html>
<html>
<head>
    <style>
body {
    background: linear-gradient(to right, #141e30, #243b55);
}
.card {
    border-radius: 15px;
}
</style>
    <title>Loan Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">

<div class="container mt-5">
    <div class="card p-4 shadow-lg">
        <h2 class="text-center text-primary">💰 Loan Approval Predictor</h2>

        <form action="/predict" method="post">
            <input type="number" name="income" placeholder="Income" required><br><br>
            <input type="number" name="loan" placeholder="Loan Amount" required><br><br>
            <input type="number" name="credit" placeholder="Credit Score" required><br><br>
            <button type="submit">Predict</button>
        </form>

        <!-- ✅ ADD THIS PART -->
        <h4>{{ prediction_text }}</h4>
        <h5>{{ probability }}</h5>

        <!-- ✅ Graph -->
        <img src="/static/importance.png" class="img-fluid mt-3">

        <h4 class="text-center mt-4">{{ prediction_text }}</h4>
        <h5 class="text-center text-warning">{{ probability }}</h5>
    </div>
</div>

</body>
</html>
