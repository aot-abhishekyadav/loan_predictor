<!DOCTYPE html>
<html>
<head>
    <title>Loan Predictor</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #141e30, #243b55);
            min-height: 100vh;
        }

        .card {
            border-radius: 15px;
            background-color: #ffffff;
        }

        .result-box {
            background-color: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
        }
    </style>
</head>

<body>

<div class="container mt-5">
    <div class="card p-4 shadow-lg mx-auto" style="max-width: 600px;">

        <h2 class="text-center text-primary mb-4">
            💰 Loan Approval Predictor
        </h2>

        <form action="/predict" method="post">

            <input type="number"
                   class="form-control mb-3"
                   name="income"
                   placeholder="Enter Income"
                   required>

            <input type="number"
                   class="form-control mb-3"
                   name="loan"
                   placeholder="Enter Loan Amount"
                   required>

            <input type="number"
                   class="form-control mb-3"
                   name="credit"
                   placeholder="Enter Credit Score"
                   required>

            <button type="submit" class="btn btn-primary w-100">
                Predict Loan Status
            </button>

        </form>

        {% if prediction_text %}
        <div class="result-box mt-4 text-center">

            <h4>{{ prediction_text }}</h4>

            <h5 class="text-warning">
                {{ probability }}
            </h5>

            <h5>
                {{ risk }}
            </h5>

            <p class="text-muted">
                {{ recommendation }}
            </p>

        </div>
        {% endif %}

        <h6 class="text-center text-success mt-4">
            Model Accuracy: {{ accuracy }}%
        </h6>
        
        <div class="text-center mt-3">
            <h5 class="text-dark">Feature Importance</h5>
            <img src="{{ url_for('static', filename='importance.png') }}"
                 alt="Feature Importance"
                 class="img-fluid rounded">
        </div>
</div>

        <div class="text-end">
            <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
        </div>

    </div>
</div>

</body>
</html>
